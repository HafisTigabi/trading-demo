name: trading_demo_app
description: "A new Flutter trading app with BLoC + Freezed"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  flutter_bloc: ^9.1.1
  bloc: ^9.1.0

  go_router: ^16.3.0

  
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  equatable: ^2.0.5
  responsive_framework: ^1.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  build_runner: ^2.4.15
  freezed: ^2.5.7
  json_serializable: ^6.9.5

flutter:
  uses-material-design: true

  assets:
    - assets/fonts/

  fonts:
    - family: Manrope
      fonts:
        - asset: assets/fonts/Manrope-Bold.ttf
        - asset: assets/fonts/Manrope-ExtraBold.ttf
        - asset: assets/fonts/Manrope-ExtraLight.ttf
        - asset: assets/fonts/Manrope-Light.ttf
        - asset: assets/fonts/Manrope-Medium.ttf
        - asset: assets/fonts/Manrope-Regular.ttf
        - asset: assets/fonts/Manrope-SemiBold.ttf